<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pefitra | dashboard</title>

    <!-- Link Stylesheets -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <!-- Font and Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

</head>

<body>
    <div class="app">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Pefitra</h2>

            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="transaction.html">Transaction</a>
                <a href="wallet.html">Wallet</a>
                <a href="budget.html">Budget</a>
                <a href="goals.html">Goals</a>
                <a href="analysis.html">Analysis</a>
                <a href="settings.html">Setting</a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main">

            <!-- Topbarsssss -->
            <header class="topbar">
                <h1>Dashboard</h1>
            </header>

            <!-- Content -->
            <section class="content">

                <!-- Summary -->
                <div class="summary">
                    <div class="card">
                        <h3>Total Balance</h3>
                        <p class="amount">Rp 5.200.000</p>
                    </div>
                    <div class="card">
                        <h3>Income</h3>
                        <p class="amount income">Rp 7.000.000</p>
                    </div>
                    <div class="card">
                        <h3>Expense</h3>
                        <p class="amount expense">Rp 1.800.000</p>
                    </div>
                </div>

                <!-- Money Flow -->
                <div class="card">
                    <h3>Money Flow</h3>
                    <div class="chart">
                        <div class="bar" style="height: 60%"></div>
                        <div class="bar" style="height: 80%"></div>
                        <div class="bar" style="height: 40%"></div>
                        <div class="bar" style="height: 90%"></div>
                        <div class="bar" style="height: 50%"></div>
                    </div>
                </div>

                <!-- Recent Transactions -->
                <div class="card">
                    <h3>Recent Transactions</h3>

                    <div class="transactions">
                        <span>Beli kopi</span>
                        <span class="expense">- Rp 20.000</span>
                    </div>

                    <div class="transactions">
                        <span>Gaji</span>
                        <span class="expense">+ Rp 5.000.000</span>
                    </div>

                    <div class="transactions">
                        <span>Transport</span>
                        <span class="expense">- Rp 50.000</span>
                    </div>

                </div>

            </section>
        </main>
    </div>
</body>

</html>
