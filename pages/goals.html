<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pefitra | dashboard</title>

    <!-- Link Stylesheets -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <!-- Font and Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

</head>

<body>
    <div class="app">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Pefitra</h2>

            <nav>
                <a href="dashboard.html">Dashboard</a>
                <a href="transaction.html">Transaction</a>
                <a href="wallet.html">Wallet</a>
                <a href="budget.html">Budget</a>
                <a href="goals.html">Goals</a>
                <a href="analysis.html">Analysis</a>
                <a href="settings.html">Setting</a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main">

            <!-- Topbarsssss -->
            <header class="topbar">
                <h1>Dashboard</h1>
            </header>

            <!-- Content -->
            <section class="content">

                <div class="card">
                    <h3>Add Goal</h3>

                    <input type="text" id="goalName" class="input" placeholder="Goal Name">
                    <input type="number" id="goalTarget" class="input" placeholder="Target">

                    <button class="btn" id="addGoalBtn">Add</button>
                </div>

                <div class="card">
                    <h3>Goals</h3>
                    <div id="goalList"></div>
                </div>

            </section>
        </main>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/goals.js"></script>
</body>

</html>
